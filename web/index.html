<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Session Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        h1 { color: #cba6f7; margin-bottom: 16px; font-size: 1.4em; }
        .drop-zone {
            border: 2px dashed #585b70;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #cba6f7;
        }
        .drop-zone input { display: none; }
        .session-title {
            color: #f5c2e7;
            font-size: 1.1em;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: #313244;
            border-radius: 6px;
        }
        .entry {
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        .entry-header {
            padding: 8px 12px;
            font-weight: bold;
            font-size: 0.85em;
            display: flex;
            justify-content: space-between;
        }
        .entry-body { padding: 10px 12px; }
        .entry.user .entry-header { background: #1e66f5; color: #fff; }
        .entry.user .entry-body { background: #1e3a5f; }
        .entry.assistant .entry-header { background: #40a02b; color: #fff; }
        .entry.assistant .entry-body { background: #1e3a2a; }
        .entry.metadata .entry-header { background: #585b70; color: #cdd6f4; }
        .entry.metadata .entry-body { background: #313244; }
        .content-block { margin-bottom: 8px; }
        .content-block:last-child { margin-bottom: 0; }
        .thinking {
            background: #45475a;
            border-left: 3px solid #f9e2af;
            padding: 8px 10px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 0.9em;
        }
        .thinking-label {
            color: #f9e2af;
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
        }
        .thinking-content { display: none; white-space: pre-wrap; }
        .thinking.open .thinking-content { display: block; }
        .tool-use {
            background: #313244;
            border-left: 3px solid #89b4fa;
            padding: 8px 10px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        .tool-use-label {
            color: #89b4fa;
            font-weight: bold;
            font-size: 0.8em;
        }
        .tool-use-description {
            font-size: 0.85em;
            color: #a6adc8;
            margin-top: 4px;
        }
        .tool-use-command {
            display: block;
            background: #1e1e2e;
            color: #a6e3a1;
            padding: 6px 10px;
            margin-top: 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            user-select: all;
            cursor: text;
        }
        .tool-use-details {
            display: none;
            margin-top: 6px;
        }
        .tool-use.open .tool-use-details { display: block; }
        .tool-use-input {
            white-space: pre-wrap;
            font-size: 0.85em;
            color: #a6adc8;
        }
        .tool-result {
            background: #313244;
            border-left: 3px solid #a6e3a1;
            padding: 8px 10px;
            border-radius: 0 4px 4px 0;
            white-space: pre-wrap;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }
        .tool-result.error { border-left-color: #f38ba8; }
        .tool-result-label {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
        }
        .tool-result-label.error { color: #f38ba8; }
        .tool-result-label.ok { color: #a6e3a1; }
        .text-block { white-space: pre-wrap; line-height: 1.5; }
        .timestamp { color: #bac2de; font-size: 0.8em; }
        .entry.hidden { display: none; }
        body.show-metadata .entry.hidden { display: block; }
        .toggle-metadata {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #585b70;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            margin-bottom: 16px;
        }
        .toggle-metadata:hover { border-color: #cba6f7; }
        .errors {
            background: #45475a;
            border-left: 3px solid #f38ba8;
            padding: 10px 12px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 12px;
            color: #f38ba8;
        }
    </style>
</head>
<body>
    <h1>Claude Code Session Viewer</h1>
    <div class="drop-zone" id="dropZone">
        <p>Drop a <strong>.jsonl</strong> session file here, or click to browse</p>
        <input type="file" id="fileInput" accept=".jsonl">
    </div>
    <button class="toggle-metadata" id="toggleMetadata" style="display:none">Show metadata</button>
    <div id="output"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js" async></script>
    <script src="parser.js"></script>
    <script src="renderer.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        let parserModule = null;

        ParserModule().then(mod => { parserModule = mod; }).catch(() => {
            output.innerHTML = '<div class="errors">Failed to load WebAssembly parser module.</div>';
        });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

        function handleFile(file) {
            if (!file || !parserModule) return;
            const reader = new FileReader();
            reader.onload = () => displaySession(reader.result);
            reader.readAsText(file);
        }

        const toggleBtn = document.getElementById('toggleMetadata');
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('show-metadata');
            toggleBtn.textContent = document.body.classList.contains('show-metadata')
                ? 'Hide metadata' : 'Show metadata';
        });

        output.addEventListener('click', e => {
            const toggle = e.target.closest('.thinking, .tool-use');
            if (toggle) toggle.classList.toggle('open');
        });

        function displaySession(jsonl) {
            const session = parserModule.parseSession(jsonl);
            output.innerHTML = renderSession(session);
            toggleBtn.style.display = '';
        }
    </script>
</body>
</html>
