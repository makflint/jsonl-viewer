<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Session Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        h1 { color: #cba6f7; margin-bottom: 16px; font-size: 1.4em; }
        .drop-zone {
            border: 2px dashed #585b70;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #cba6f7;
        }
        .drop-zone input { display: none; }
        .session-title {
            color: #f5c2e7;
            font-size: 1.1em;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: #313244;
            border-radius: 6px;
        }
        .entry {
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        .entry-header {
            padding: 8px 12px;
            font-weight: bold;
            font-size: 0.85em;
            display: flex;
            justify-content: space-between;
        }
        .entry-body { padding: 10px 12px; }
        .entry.user .entry-header { background: #1e66f5; color: #fff; }
        .entry.user .entry-body { background: #1e3a5f; }
        .entry.assistant .entry-header { background: #40a02b; color: #fff; }
        .entry.assistant .entry-body { background: #1e3a2a; }
        .entry.metadata .entry-header { background: #585b70; color: #cdd6f4; }
        .entry.metadata .entry-body { background: #313244; }
        .entry.raw .entry-header { background: #f5c2e7; color: #1e1e2e; }
        .entry.raw .entry-header .timestamp { color: #4c4f69; }
        .entry.raw .entry-body { background: #292c3c; }
        .content-block.raw pre {
            background: #1e1e2e;
            border-radius: 4px;
            padding: 10px 12px;
            overflow-x: auto;
            font-size: 0.85em;
            line-height: 1.4;
        }
        .content-block.raw code { font-family: monospace; }
        .content-block { margin-bottom: 8px; }
        .content-block:last-child { margin-bottom: 0; }
        .thinking {
            background: #45475a;
            border-left: 3px solid #f9e2af;
            padding: 8px 10px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 0.9em;
        }
        .thinking-label {
            color: #f9e2af;
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
        }
        .thinking-content { display: none; white-space: pre-wrap; }
        .thinking.open .thinking-content { display: block; }
        .tool-use {
            background: #313244;
            border-left: 3px solid #89b4fa;
            padding: 8px 10px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        .tool-use-label {
            color: #89b4fa;
            font-weight: bold;
            font-size: 0.8em;
        }
        .tool-use-description {
            font-size: 0.85em;
            color: #a6adc8;
            margin-top: 4px;
        }
        .tool-use-command {
            display: block;
            background: #1e1e2e;
            color: #a6e3a1;
            padding: 6px 10px;
            margin-top: 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            user-select: all;
            cursor: text;
        }
        .tool-use-details {
            display: none;
            margin-top: 6px;
        }
        .tool-use.open .tool-use-details { display: block; }
        .tool-use-input {
            white-space: pre-wrap;
            font-size: 0.85em;
            color: #a6adc8;
        }
        .tool-result {
            background: #313244;
            border-left: 3px solid #a6e3a1;
            padding: 8px 10px;
            border-radius: 0 4px 4px 0;
            white-space: pre-wrap;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }
        .tool-result.error { border-left-color: #f38ba8; }
        .tool-result-label {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
        }
        .tool-result-label.error { color: #f38ba8; }
        .tool-result-label.ok { color: #a6e3a1; }
        .text-block { white-space: pre-wrap; line-height: 1.5; }
        .timestamp { color: #bac2de; font-size: 0.8em; }
        .entry.hidden { display: none; }
        body.show-metadata .entry.hidden { display: block; }
        .toggle-metadata {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #585b70;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            margin-bottom: 16px;
        }
        .toggle-metadata:hover { border-color: #cba6f7; }
        /* Override warm highlight.js colors with cool tones */
        .hljs-number, .hljs-literal { color: #89b4fa; }
        .hljs-string, .hljs-doctag { color: #a6e3a1; }
        .hljs-built_in { color: #94e2d5; }
        .hljs-keyword, .hljs-selector-tag { color: #cba6f7; }
        .hljs-title, .hljs-function { color: #89b4fa; }
        .hljs-comment { color: #6c7086; }
        .hljs-variable, .hljs-attr { color: #b4befe; }
        .errors {
            background: #45475a;
            border-left: 3px solid #f38ba8;
            padding: 10px 12px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 12px;
            color: #f38ba8;
        }
        .view-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid #585b70;
        }
        .view-tab {
            background: transparent;
            color: #bac2de;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9em;
            border-bottom: 2px solid transparent;
        }
        .view-tab.active {
            color: #cba6f7;
            border-bottom-color: #cba6f7;
        }
        #outputTable { overflow-x: auto; }
        .raw-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85em;
            background: #1e1e2e;
        }
        .raw-table thead { background: #313244; position: sticky; top: 0; }
        .raw-table th, .raw-table td {
            border: 1px solid #313244;
            padding: 4px 8px;
            text-align: left;
            white-space: nowrap;
            max-width: 30em;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .raw-table th {
            color: #cba6f7;
            font-weight: bold;
            cursor: context-menu;
        }
        .raw-table th[colspan] { text-align: center; color: #89b4fa; border-bottom: 1px solid #585b70; }
        .raw-table .cell-null { color: #6c7086; }
        .raw-table tbody tr:hover { background: #292c3c; }
        .raw-table th.col-hidden, .raw-table td.col-hidden { display: none; }
        .schema-stats { margin-top: 24px; font-family: monospace; }
        .schema-stats-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .jump-link { color: #89b4fa; text-decoration: none; font-size: 0.9em; }
        .jump-link:hover { text-decoration: underline; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .stats-table td { padding: 6px 12px; vertical-align: top; border-bottom: 1px solid #313244; }
        .stats-name { color: #cba6f7; }
        .stats-kind { color: #6c7086; }
        .stats-presence { color: #bac2de; }
        .stats-detail { color: #a6adc8; }
        .col-context-menu {
            position: absolute;
            background: #313244;
            border: 1px solid #585b70;
            border-radius: 4px;
            padding: 4px 0;
            z-index: 1000;
            font-size: 0.85em;
        }
        .col-context-menu button {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #cdd6f4;
            padding: 6px 16px;
            text-align: left;
            cursor: pointer;
        }
        .col-context-menu button:hover { background: #45475a; }
    </style>
</head>
<body>
    <h1>Claude Code Session Viewer</h1>
    <div class="drop-zone" id="dropZone">
        <p>Drop a <strong>.jsonl</strong> session file here, or click to browse</p>
        <input type="file" id="fileInput" accept=".jsonl">
    </div>
    <button class="toggle-metadata" id="toggleMetadata" style="display:none">Show metadata</button>
    <div class="view-tabs" id="viewTabs" style="display:none">
        <button class="view-tab active" data-view="json" id="tabJson">JSON view</button>
        <button class="view-tab" data-view="table" id="tabTable">Table view</button>
    </div>
    <div id="outputJson"></div>
    <div id="outputTable" style="display:none"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js" async></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@catppuccin/highlightjs@1/css/catppuccin-mocha.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js" async></script>
    <script src="parser.js"></script>
    <script src="renderer.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let parserModule = null;

        ParserModule().then(mod => { parserModule = mod; }).catch(() => {
            document.getElementById('outputJson').innerHTML = '<div class="errors">Failed to load WebAssembly parser module.</div>';
        });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

        function handleFile(file) {
            if (!file || !parserModule) return;
            const reader = new FileReader();
            reader.onload = () => displaySession(reader.result);
            reader.readAsText(file);
        }

        const toggleBtn = document.getElementById('toggleMetadata');
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('show-metadata');
            toggleBtn.textContent = document.body.classList.contains('show-metadata')
                ? 'Hide metadata' : 'Show metadata';
        });

        document.getElementById('outputJson').addEventListener('click', e => {
            const toggle = e.target.closest('.thinking, .tool-use');
            if (toggle) toggle.classList.toggle('open');
        });

        if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
            marked.setOptions({ highlight: (code, lang) => hljs.highlight(code, { language: lang || 'plaintext' }).value });
        }

        document.querySelectorAll('.view-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const view = tab.dataset.view;
                document.getElementById('outputJson').style.display = view === 'json' ? '' : 'none';
                document.getElementById('outputTable').style.display = view === 'table' ? '' : 'none';
            });
        });

        let hiddenColumns = new Set();
        let contextMenu = null;

        function closeContextMenu() {
            if (contextMenu) { contextMenu.remove(); contextMenu = null; }
        }

        function applyColumnHiding() {
            const table = document.querySelector('.raw-table');
            if (!table) return;
            table.querySelectorAll('th[data-path], td[data-path]').forEach(el => {
                const path = el.getAttribute('data-path');
                const hide = Array.from(hiddenColumns).some(h => path === h || path.startsWith(h + '.'));
                el.classList.toggle('col-hidden', hide);
            });
        }

        document.getElementById('outputTable').addEventListener('contextmenu', e => {
            const th = e.target.closest('.raw-table th[data-path]');
            if (!th) return;
            e.preventDefault();
            closeContextMenu();
            const path = th.getAttribute('data-path');
            contextMenu = document.createElement('div');
            contextMenu.className = 'col-context-menu';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
            contextMenu.innerHTML = `
                <button data-action="hide">Hide column</button>
                <button data-action="show-all">Show all columns</button>
            `;
            contextMenu.addEventListener('click', ev => {
                const action = ev.target.dataset.action;
                if (action === 'hide') { hiddenColumns.add(path); }
                else if (action === 'show-all') { hiddenColumns.clear(); }
                applyColumnHiding();
                closeContextMenu();
            });
            document.body.appendChild(contextMenu);
        });

        document.addEventListener('click', closeContextMenu);
        document.addEventListener('scroll', closeContextMenu, true);

        let currentSession = null;

        function displaySession(jsonl) {
            if (!isJsonl(jsonl)) {
                document.getElementById('outputJson').innerHTML = '<div class="errors">File does not appear to be JSONL — first line is not valid JSON.</div>';
                return;
            }
            hiddenColumns.clear();
            const session = parserModule.parseSession(jsonl);
            currentSession = session;
            document.getElementById('outputJson').innerHTML = renderSession(session);
            toggleBtn.style.display = '';

            // Show tabs and render table only when raw schema is present
            const hasSchema = parserModule.hasRawSchema(session);
            const tabs = document.getElementById('viewTabs');
            tabs.style.display = hasSchema ? '' : 'none';
            if (hasSchema) {
                const schema = parserModule.getRawSchema(session);
                const rawEntriesJson = [];
                const entriesLen = session.entries.size();
                for (let i = 0; i < entriesLen; i++) {
                    const e = session.entries.get(i);
                    if (e.type === 'raw' && e.content.size() > 0) {
                        try { rawEntriesJson.push(JSON.parse(e.content.get(0).text)); } catch(_) {}
                    }
                }
                const tableHtml = '<div id="raw-table">' + renderRawTable(rawEntriesJson, schema) + '</div>';
                const statsHtml = renderSchemaStats(schema);
                document.getElementById('outputTable').innerHTML = tableHtml + statsHtml;
            }
        }
    </script>
</body>
</html>
